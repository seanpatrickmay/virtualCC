# VCC log rotation. Installed to ~/.config/logrotate.conf
# Run weekly via cron (Sundays 5am): logrotate --state ~/.local/state/logrotate.status ~/.config/logrotate.conf

/home/dev/.local/log/cron/*.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 644 dev dev
}
